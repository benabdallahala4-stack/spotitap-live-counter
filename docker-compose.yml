services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotitap_live
      POSTGRES_PASSWORD: spotitap_live
      POSTGRES_DB: spotitap_live
    ports:
      - "55432:5432"
    volumes:
      - live_counter_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotitap_live -d spotitap_live"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "18883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  live_counter_pg:
